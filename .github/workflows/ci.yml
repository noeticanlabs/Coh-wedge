name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coh-node

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            coh-node/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('coh-node/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy — deny warnings
        run: cargo clippy -- -D warnings

      - name: Build (release)
        run: cargo build --release

      - name: Run tests
        run: cargo test

  benchmark:
    name: Benchmark (perf regression guard)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coh-node
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            coh-node/target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('coh-node/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      - name: Run benchmark (smoke test — verify it completes without error)
        run: cargo run --example benchmark -p coh-core --release

  demo-test:
    name: Demo Test (CI regression guard)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coh-node
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            coh-node/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('coh-node/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build binary
        run: cargo build --release -p coh-validator

      - name: Run demo test (shell script)
        run: bash tests/demo_test.sh
        env:
          BIN: target/release/coh-validator
          EXAMPLES: examples

  dashboard-test:
    name: Dashboard UI Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: coh-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: coh-dashboard

      - name: Run UI tests
        run: npm run test:run
        working-directory: coh-dashboard
