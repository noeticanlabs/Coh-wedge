name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-build-and-test:
    name: Rust Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coh-node

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            coh-node/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('coh-node/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy � deny warnings
        run: cargo clippy -- -D warnings

      - name: Build (release)
        run: cargo build --release

      - name: Run tests
        run: cargo test

      - name: Run bounded acceptance-path suite
        run: cargo test -p coh-core --test test_valid_chain

      - name: Generate bounded valid and semi-realistic fixtures
        run: cargo run -p coh-core --example gen_ai_fixtures

      - name: Assert generated fixture outputs exist
        shell: bash
        run: |
          test -f vectors/valid/valid_chain_10.jsonl
          test -f vectors/valid/valid_chain_100.jsonl
          test -f vectors/valid/valid_chain_1000.jsonl
          test -f vectors/semi_realistic/ai_workflow_valid.jsonl
          test -f vectors/semi_realistic/ai_workflow_noisy.jsonl

  ape-build:
    name: APE Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ape

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-ape-cargo-${{ hashFiles('ape/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-ape-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy deny warnings
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build

      - name: Run tests
        run: cargo test

  formal-verification:
    name: Lean T-Stack Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Lean 4 (Elan)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Build T-Stack Ledger
        run: |
          cd coh-t-stack
          lake build
        env:
          ELAN_HOME: /home/runner/.elan

      - name: Audit for sorry/admit
        run: |
          if grep -rn "sorry" coh-t-stack/Coh || grep -rn "admit" coh-t-stack/Coh; then
            echo "::error::T-Stack Ledger contains placeholders (sorry/admit). Safety Wedge integrity not guaranteed."
            exit 1
          fi

  compliance-audit:
    name: Compliance Vector Audit
    runs-on: ubuntu-latest
    needs: rust-build-and-test
    defaults:
      run:
        working-directory: coh-node
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            coh-node/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('coh-node/Cargo.lock') }}

      - name: Generate Adversarial Vectors
        run: cargo run --example gen_adversarial_vectors -p coh-core

      - name: Generate Acceptance and Semi-Realistic Vectors
        run: cargo run --example gen_ai_fixtures -p coh-core

      - name: Audit Generated Vector Surface
        shell: bash
        run: |
          test -f vectors/valid/valid_chain_10.jsonl
          test -f vectors/valid/valid_chain_100.jsonl
          test -f vectors/valid/valid_chain_1000.jsonl
          test -f vectors/semi_realistic/ai_workflow_valid.jsonl
          test -f vectors/semi_realistic/ai_workflow_noisy.jsonl

      - name: Run Compliance Audit
        run: |
          cargo run --example benchmark_integrity -p coh-core

  dashboard-test:
    name: Dashboard UI Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: coh-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: coh-dashboard

      - name: Run UI tests
        run: npm run test:run
        working-directory: coh-dashboard
