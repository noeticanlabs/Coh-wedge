name: CI

on:
  push:
    branches: [ "main", "master", "GMI" ]
  pull_request:
    branches: [ "main", "master", "GMI" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-build-and-test:
    name: Rust Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coh-node

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          components: rustfmt, clippy

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install matplotlib requests

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            coh-node/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('coh-node/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy - deny warnings
        run: cargo clippy --all-targets -- -D warnings

      - name: Build (release)
        run: cargo build --release

      - name: Run all tests (workspace)
        run: cargo test --workspace

      - name: Rename libcoh.so to coh.so (Linux)
        shell: bash
        run: |
          if [ -f target/release/libcoh.so ]; then
            cp target/release/libcoh.so target/release/coh.so
            echo "Successfully renamed libcoh.so to coh.so"
          fi

      - name: Run Property Tests
        run: cargo test -p coh-core --test test_property

      - name: Run Differential Tests
        run: cargo test -p coh-core --test test_differential

      - name: Generate bounded valid and semi-realistic fixtures
        run: cargo run -p coh-core --example gen_ai_fixtures

      - name: Assert generated fixture outputs exist
        shell: bash
        run: |
          test -f vectors/valid/valid_chain_10.jsonl
          test -f vectors/valid/valid_chain_100.jsonl
          test -f vectors/valid/valid_chain_1000.jsonl
          test -f vectors/semi_realistic/ai_workflow_valid.jsonl
          test -f vectors/semi_realistic/ai_workflow_noisy.jsonl

  ape-build:
    name: APE Build & Test
    runs-on: ubuntu-latest
    # Only run if ape/ directory exists
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if ape/ exists
        id: check_ape
        shell: bash
        run: |
          if [ -d "ape" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Rust stable toolchain
        if: steps.check_ape.outputs.exists == 'true'
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          components: rustfmt, clippy

      - name: Cache Cargo registry
        if: steps.check_ape.outputs.exists == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ape/target
          key: ${{ runner.os }}-ape-cargo-${{ hashFiles('ape/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-ape-cargo-

      - name: Check formatting
        if: steps.check_ape.outputs.exists == 'true'
        run: cargo fmt --check
        working-directory: ape

      - name: Clippy deny warnings
        if: steps.check_ape.outputs.exists == 'true'
        run: cargo clippy -- -D warnings
        working-directory: ape

      - name: Build
        if: steps.check_ape.outputs.exists == 'true'
        run: cargo build
        working-directory: ape

      - name: Run tests
        if: steps.check_ape.outputs.exists == 'true'
        run: cargo test
        working-directory: ape

  genesis-npe-test:
    name: Genesis/NPE Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            coh-node/target
          key: ${{ runner.os }}-genesis-cargo-${{ hashFiles('coh-node/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-genesis-cargo-

      - name: Test Genesis metrics
        run: cargo test -p coh-genesis --lib
        working-directory: coh-node

      - name: Test Formation admissibility
        run: cargo test -p coh-core --lib -- is_formation
        working-directory: coh-node

      - name: Verify Genesis check in verify_micro
        run: cargo test -p coh-core -- verify_micro_with_context
        working-directory: coh-node

  compliance-audit:
    name: Compliance Vector Audit
    runs-on: ubuntu-latest
    needs: rust-build-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            coh-node/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('coh-node/Cargo.lock') }}

      - name: Install Rust stable toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build coh-validator
        run: cargo build --release --bin coh-validator
        working-directory: ./coh-node

      - name: Verify Adversarial Rejections
        shell: bash
        run: bash scripts/verify_adversarial.sh

      - name: Run Integrity Benchmark
        run: cd coh-node && cargo run --release --example benchmark_integrity -p coh-core

  integration-test:
    name: E2E Integration Test
    runs-on: ubuntu-latest
    needs: rust-build-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            coh-node/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('coh-node/Cargo.lock') }}

      - name: Install Rust stable toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build coh-sidecar
        run: cargo build --release --bin coh-sidecar
        working-directory: ./coh-node

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install requests matplotlib numpy

      - name: Run E2E Script
        shell: bash
        run: bash scripts/ci_e2e.sh

  trajectory-audit:
    name: Trajectory Equivalence Audit
    runs-on: ubuntu-latest
    needs: rust-build-and-test
    defaults:
      run:
        working-directory: coh-node
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            coh-node/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('coh-node/Cargo.lock') }}

      - name: Run Equivalence Vectors
        run: cargo test -p coh-core trajectory::equivalence_tests

  dashboard-test:
    name: Dashboard UI Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: coh-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: coh-dashboard

      - name: Run UI tests
        run: npm run test:run
        working-directory: coh-dashboard

  formal-verification:
    name: Lean 4 Formal Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Lean 4
        uses: leanprover/lean-action@v1
        with:
          working-directory: coh-t-stack

      - name: Build Lean library
        run: |
          lake exe cache get
          lake build
        working-directory: coh-t-stack
